services:
  postgres:
    image: postgres:15-alpine
    container_name: formatting_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-formatting_documents}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - formatting_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:-formatting-documents:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formatting_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_ROOT: /app
      APP_BUFFER_DIR: /app/buffer
      APP_DATA_FILE: /app/data.json
      PYTHON_BIN: python3
      DATABASE_URL: "user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-formatting_documents} host=postgres port=5432 sslmode=disable"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - formatting_network

volumes:
  postgres_data:

networks:
  formatting_network:
    driver: bridge
