<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{ define "links" }}
        <link rel="stylesheet" href="../static/css/header.css">
        <link rel="stylesheet" href="../static/css/auth.css">
        <link rel="stylesheet" href="../static/css/notification.css">
        <link rel="stylesheet" href="../static/css/form.css">
        <script defer src="../static/js/auth.js"></script>
        <script defer src="../static/js/notification.js"></script>
        <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    {{ end }}
    <title>{{ define "title" }}Ой{{ end }}</title>
</head>
<body>
    {{ define "content" }}
        {{ template "auth-modals" . }}
        <div class="error-header">
            {{ template "auth-menu" . }}
            <h1 class="title">
                <span class="word">Ошибка</span>
            </h1>
        </div>
        <div class="main-window-secondary">
            <h2 class="download-title">Время обработки превысило норму. Попробуйте ещё раз загрузить документ на сайт.</h2>
            <div class="edit-button-container">
                <a href="/" class="edit-button-link">Вернуться на гравную</a>
            </div>
        </div>
    {{ end }}
</body>
</html>
